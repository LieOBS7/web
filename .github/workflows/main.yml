uname: PHP to HTML Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none
      
      - name: Install dependencies (if needed)
        run: |
          if [ -f composer.json ]; then
            composer install --no-dev --prefer-dist --optimize-autoloader
          fi
      
      - name: Convert PHP to HTML
        run: |
          # 创建输出目录
          mkdir -p ./build
          
          # 遍历根目录下所有 PHP 文件
          for file in *.php; do
            if [ -f "$file" ]; then
              # 跳过隐藏文件和工作流相关
              case "$file" in
                .github|composer|vendor) ;;
                *)
                  base="${file%.php}"
                  echo "Rendering $file → $base.html..."
                  php "$file" > "./build/$base.html" 2>&1 || {
                    echo "⚠️ Warning: Failed to process $file" >&2
                  }
                  ;;
              esac
            fi
          done
          
          # 复制静态资源（CSS/JS/Images）到 build 目录
          if [ -d css ]; then cp -r css ./build/; fi
          if [ -d js ]; then cp -r js ./build/; fi
          if [ -d images ]; then cp -r images ./build/; fi
          if [ -d assets ]; then cp -r assets ./build/; fi
          
          echo "Build complete!"
      
      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
